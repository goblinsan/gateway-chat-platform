services:
  chat-api:
    build:
      context: .
      dockerfile: apps/chat-api/Dockerfile
    restart: unless-stopped
    env_file:
      - ${CHAT_API_ENV_FILE:-apps/chat-api/.env}
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
    volumes:
      - ${CHAT_API_DATA_DIR:-./.data/chat-api}:/app/data
    networks:
      - default
      - agent-service
    command: >
      sh -lc "mkdir -p /app/data
      && pnpm --filter @gateway/chat-api prisma:migrate
      && pnpm --filter @gateway/chat-api start"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chat-ui:
    build:
      context: .
      dockerfile: apps/chat-ui/Dockerfile
    restart: unless-stopped
    depends_on:
      - chat-api

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3301}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - chat-ui
      - chat-api

networks:
  default:
  # Externally-managed network created by the agent-service compose project on
  # the gateway host. Attaching chat-api here lets it resolve `agent-service` by
  # DNS via the host-internal docker network, so every blue/green deploy keeps
  # working without a post-deploy `docker network connect` step.
  # If the network name ever changes, override with:
  #   AGENT_SERVICE_NETWORK=<real-network-name> docker compose up -d
  agent-service:
    external: true
    name: ${AGENT_SERVICE_NETWORK:-agent-service_default}
