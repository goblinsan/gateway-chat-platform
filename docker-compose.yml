version: '3.9'

services:
  chat-api:
    build:
      context: .
      dockerfile: apps/chat-api/Dockerfile
    restart: unless-stopped
    env_file: apps/chat-api/.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chat-ui:
    build:
      context: .
      dockerfile: apps/chat-ui/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - chat-api

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - chat-ui
      - chat-api
