name: iOS Build

on:
  pull_request:
    paths:
      - 'apps/ios/**'
      - '.github/workflows/ios-build.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  xcodebuild:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build GatewayAppFoundation for iOS Simulator
        working-directory: apps/ios
        run: xcodebuild -scheme GatewayAppFoundation -destination 'generic/platform=iOS Simulator' build
