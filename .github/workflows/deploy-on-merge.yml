name: Deploy On Merge

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'apps/ios/**'
  workflow_dispatch:
    inputs:
      revision:
        description: Optional git revision to deploy instead of the current workflow SHA
        required: false
        type: string

concurrency:
  group: gateway-chat-platform-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - gateway
    env:
      DEPLOY_REVISION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.revision || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @gateway/chat-ui typecheck
      - run: /opt/gateway-control-plane/deploy/bin/deploy-app.sh --config /opt/gateway-control-plane/configs/gateway.config.json --app gateway-chat-platform --revision "${DEPLOY_REVISION}"
