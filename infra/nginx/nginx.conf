# Gateway Chat Platform — Nginx reverse proxy configuration
# Serves chat-ui on / and proxies API traffic to chat-api on /api/

upstream chat_ui {
    server chat-ui:5173;
}

upstream chat_api {
    server chat-api:3000;
}

server {
    listen 80;
    server_name chat.yourdomain.com;

    # Redirect HTTP to HTTPS in production
    # Uncomment if TLS is terminated at Nginx rather than Cloudflare
    # return 301 https://$host$request_uri;

    # Forward real IP from Cloudflare
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API routes → chat-api
    location /api/ {
        proxy_pass http://chat_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Static assets — served by Vite dev server or built SPA
    location / {
        proxy_pass http://chat_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
